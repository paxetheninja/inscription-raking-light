name: inscription_raking_light
description: "Mobile companion for raking-light documentation of inscriptions."
publish_to: 'none'
version: 0.8.0+8

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Filesystem + sharing
  path: ^1.9.0
  path_provider: ^2.1.4
  share_plus: ^10.0.2

  # Camera + permissions (v0.2)
  camera: ^0.11.0
  permission_handler: ^11.3.1

  # Pure-Dart image processing for preview reductions (v0.3)
  image: ^4.2.0

  # Session export — zip the session folder for share-sheet handoff (v0.6)
  archive: ^4.0.0

  # Feature-based registration for v0.9 (ORB + RANSAC similarity transform).
  # Native binaries fetched via Dart Native Assets (requires Dart 3.10+).
  opencv_dart: ^2.2.1+4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
