name: inscription_raking_light
description: "Mobile companion for raking-light documentation of inscriptions."
publish_to: 'none'
version: 0.5.0+5

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Filesystem + sharing
  path: ^1.9.0
  path_provider: ^2.1.4
  share_plus: ^10.0.2

  # Camera + permissions (v0.2)
  camera: ^0.11.0
  permission_handler: ^11.3.1

  # Pure-Dart image processing for preview reductions (v0.3)
  image: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
